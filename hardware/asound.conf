# ALSA configuration — USB microphone as default capture device
# Place this file at /etc/asound.conf or ~/.asoundrc on the Pi5
#
# To find your USB mic card index, run: arecord -l
# Then update the card/device values below if needed.

pcm.!default {
    type asym
    capture.pcm "usb_mic"
    playback.pcm "hw:0,0"
}

pcm.usb_mic {
    type plug
    slave {
        pcm "hw:1,0"       # card 1, device 0 — adjust to match arecord -l output
        rate 16000
        channels 1
        format S16_LE
    }
}

ctl.!default {
    type hw
    card 1
}
