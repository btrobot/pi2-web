<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi5 离线翻译系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1677ff;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    #status-badge {
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.2);
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .card h2 {
      font-size: .95rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ── Translate buttons ── */
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .btn-mode {
      padding: 14px 10px;
      border: 1.5px solid #d9d9d9;
      border-radius: 8px;
      background: #fafafa;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 500;
      transition: background .15s, border-color .15s, color .15s;
      text-align: center;
      line-height: 1.4;
    }

    .btn-mode:hover { background: #e6f4ff; border-color: #1677ff; color: #1677ff; }
    .btn-mode:active { background: #bae0ff; }
    .btn-mode:disabled { opacity: .5; cursor: not-allowed; }

    .btn-mode .mode-label { font-size: .75rem; color: #888; display: block; margin-top: 2px; }

    /* ── Text input area ── */
    #translate-input {
      width: 100%;
      min-height: 80px;
      border: 1.5px solid #d9d9d9;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .9rem;
      resize: vertical;
      margin-bottom: 10px;
      font-family: inherit;
      transition: border-color .15s;
    }

    #translate-input:focus { outline: none; border-color: #1677ff; }

    /* ── Result box ── */
    #translate-result {
      min-height: 48px;
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .9rem;
      color: #389e0d;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    #translate-result.error {
      background: #fff2f0;
      border-color: #ffccc7;
      color: #cf1322;
    }

    /* ── Record button ── */
    #btn-record {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      background: #ff4d4f;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    #btn-record:hover { background: #ff7875; }
    #btn-record:active { transform: scale(.98); }
    #btn-record:disabled { background: #d9d9d9; cursor: not-allowed; }

    #record-status {
      margin-top: 10px;
      font-size: .85rem;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    /* ── Lists ── */
    .list-empty {
      text-align: center;
      color: #bbb;
      padding: 20px 0;
      font-size: .9rem;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
    }

    .list-item:last-child { border-bottom: none; }

    .list-item-info { flex: 1; min-width: 0; }
    .list-item-info .item-title {
      font-size: .9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item-info .item-meta {
      font-size: .78rem;
      color: #888;
      margin-top: 2px;
    }

    .btn-dl {
      flex-shrink: 0;
      padding: 5px 12px;
      border: 1px solid #1677ff;
      border-radius: 6px;
      background: transparent;
      color: #1677ff;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .btn-dl:hover { background: #1677ff; color: #fff; }

    /* ── Export row ── */
    .export-row {
      margin-top: 12px;
      text-align: right;
    }

    .btn-export {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fafafa;
      font-size: .85rem;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-export:hover { background: #e6f4ff; border-color: #1677ff; color: #1677ff; }

    /* ── System status ── */
    #system-status {
      font-size: .85rem;
      color: #555;
      line-height: 1.8;
    }

    .status-ok { color: #52c41a; font-weight: 600; }
    .status-err { color: #ff4d4f; font-weight: 600; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #d9d9d9;
      border-top-color: #1677ff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .88rem;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .mode-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pi5 离线翻译系统</h1>
  <span id="status-badge">检查中…</span>
</header>

<main>

  <!-- 翻译模式 -->
  <section class="card" aria-labelledby="translate-heading">
    <h2 id="translate-heading">翻译</h2>
    <textarea
      id="translate-input"
      placeholder="输入要翻译的文字（留空则使用麦克风输入）"
      aria-label="翻译输入文本"
    ></textarea>
    <div class="mode-grid" role="group" aria-label="翻译模式">
      <button class="btn-mode" data-mode="1" aria-label="模式一：中文转英文">
        中文 → 英文
        <span class="mode-label">FR-01</span>
      </button>
      <button class="btn-mode" data-mode="2" aria-label="模式二：英文转中文">
        英文 → 中文
        <span class="mode-label">FR-02</span>
      </button>
      <button class="btn-mode" data-mode="3" aria-label="模式五：语音输入+翻译（先录音再翻译）">
        语音输入
        <span class="mode-label">FR-05</span>
      </button>
      <button class="btn-mode" data-mode="4" aria-label="模式六：中文语音转英文">
        语音 中文→英文
        <span class="mode-label">FR-06</span>
      </button>
      <button class="btn-mode" data-mode="5" aria-label="模式七：英文语音转中文">
        语音 英文→中文
        <span class="mode-label">FR-06</span>
      </button>
    </div>
    <div id="lang-select" style="display:none; margin: 10px 0;">
      <label>选择语音语言：</label>
      <label><input type="radio" name="voice_lang" value="zh" checked> 中文</label>
      <label><input type="radio" name="voice_lang" value="en"> 英文</label>
    </div>
    <div id="translate-result" role="status" aria-live="polite"></div>
  </section>

  <!-- 录音 -->
  <section class="card" aria-labelledby="record-heading">
    <h2 id="record-heading">录音</h2>
    <button id="btn-record" aria-label="开始录音 FR-06">开始录音</button>
    <p id="record-status" aria-live="polite"></p>
  </section>

  <!-- 历史记录 -->
  <section class="card" aria-labelledby="history-heading">
    <h2 id="history-heading">翻译历史</h2>
    <div id="history-list"><div class="list-empty">加载中…</div></div>
    <div class="export-row">
      <button class="btn-export" id="btn-export-history">导出全部 ZIP</button>
    </div>
  </section>

  <!-- 录音列表 -->
  <section class="card" aria-labelledby="recordings-heading">
    <h2 id="recordings-heading">录音列表</h2>
    <div id="recordings-list"><div class="list-empty">加载中…</div></div>
    <div class="export-row">
      <button class="btn-export" id="btn-export-recordings">导出全部 ZIP</button>
    </div>
  </section>

  <!-- 系统状态 -->
  <section class="card" aria-labelledby="sysstat-heading">
    <h2 id="sysstat-heading">系统状态</h2>
    <div id="system-status">检查中…</div>
  </section>

</main>

<div id="toast" role="alert" aria-live="assertive"></div>

<script>
  'use strict';

  /* ── Utilities ── */

  function showToast(msg, duration = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), duration);
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!res.ok) {
      let detail = res.statusText;
      try {
        const body = await res.json();
        detail = body.error || body.detail || detail;
      } catch (_) { /* ignore parse error */ }
      throw new Error(detail);
    }
    return res.json();
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString('zh-CN', { hour12: false });
  }

  /* ── System status ── */

  async function loadStatus() {
    const el = document.getElementById('system-status');
    const badge = document.getElementById('status-badge');
    try {
      const data = await apiFetch('/api/health');
      const ok = data.status === 'ok';
      el.innerHTML = `API 状态：<span class="${ok ? 'status-ok' : 'status-err'}">${ok ? '正常' : '异常'}</span>`;
      badge.textContent = ok ? '在线' : '异常';
      badge.style.background = ok ? 'rgba(82,196,26,.3)' : 'rgba(255,77,79,.3)';
    } catch (err) {
      el.innerHTML = `API 状态：<span class="status-err">无法连接</span>`;
      badge.textContent = '离线';
      badge.style.background = 'rgba(255,77,79,.3)';
    }
  }

  /* ── History list ── */

  async function loadHistory() {
    const container = document.getElementById('history-list');
    try {
      const records = await apiFetch('/api/history');
      if (!Array.isArray(records) || records.length === 0) {
        container.innerHTML = '<div class="list-empty">暂无历史记录</div>';
        return;
      }
      container.innerHTML = records.map(r => `
        <div class="list-item">
          <div class="list-item-info">
            <div class="item-title" title="${escHtml(r.text || '')}">
              ${escHtml(r.text || '（无文本）')}
            </div>
            <div class="item-meta">${formatDate(r.created_at)} · 模式 ${escHtml(String(r.mode || ''))}</div>
          </div>
          ${r.id != null && r.has_audio
            ? `<button class="btn-dl" onclick="downloadAudio('/api/history/${r.id}/audio', 'history_${r.id}.wav')">下载音频</button>`
            : ''}
        </div>
      `).join('');
    } catch (err) {
      container.innerHTML = '<div class="list-empty">加载失败，请刷新重试</div>';
    }
  }

  /* ── Recordings list ── */

  async function loadRecordings() {
    const container = document.getElementById('recordings-list');
    try {
      const recordings = await apiFetch('/api/recordings');
      if (!Array.isArray(recordings) || recordings.length === 0) {
        container.innerHTML = '<div class="list-empty">暂无录音</div>';
        return;
      }
      container.innerHTML = recordings.map(r => `
        <div class="list-item">
          <div class="list-item-info">
            <div class="item-title">${escHtml(r.filename || `录音 ${r.id}`)}</div>
            <div class="item-meta">${formatDate(r.created_at)}${r.duration ? ` · ${r.duration}s` : ''}</div>
          </div>
          ${r.id != null
            ? `<button class="btn-dl" onclick="downloadAudio('/api/recordings/${r.id}/audio', 'recording_${r.id}.wav')">下载</button>`
            : ''}
        </div>
      `).join('');
    } catch (err) {
      container.innerHTML = '<div class="list-empty">加载失败，请刷新重试</div>';
    }
  }

  /* ── Download helper ── */

  function downloadAudio(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  /* ── XSS guard ── */

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Translation ── */

  const MODE_CONFIG = {
    1: { source_lang: 'zh', target_lang: 'en', description: '文字转语音 (TTS)', type: 'text' },
    2: { source_lang: 'en', target_lang: 'zh', description: '语音转文字 (ASR)', type: 'text' },
    3: { source_lang: 'zh', target_lang: 'en', description: '语音输入+翻译', type: 'record' },
    4: { source_lang: 'zh', target_lang: 'en', description: '中文语音→翻译+朗读', type: 'asr_mt' },
    5: { source_lang: 'en', target_lang: 'zh', description: '英文语音→翻译+朗读', type: 'asr_mt' },
  };

  async function runTranslate(mode) {
    const text = document.getElementById('translate-input').value.trim();
    const resultEl = document.getElementById('translate-result');
    const buttons = document.querySelectorAll('.btn-mode');
    const config = MODE_CONFIG[mode];

    buttons.forEach(b => b.disabled = true);
    resultEl.style.display = 'block';
    resultEl.className = '';

    try {
      let data;

      // 模式3: 语音输入（先录音，再翻译，可选语言）
      if (mode === 3) {
        const langSelect = document.getElementById('lang-select');
        langSelect.style.display = 'block';
        resultEl.innerHTML = '<span class="spinner"></span>请说话，正在录音…';
        const recordData = await apiFetch('/api/record', { method: 'POST' });
        resultEl.innerHTML = '<span class="spinner"></span>录音完成，正在翻译…';
        const voiceLang = document.querySelector('input[name="voice_lang"]:checked')?.value || 'zh';
        langSelect.style.display = 'none';
        data = await apiFetch('/api/translate', {
          method: 'POST',
          body: JSON.stringify({
            mode: 4,
            text: '',
            source_lang: voiceLang,
            target_lang: voiceLang === 'zh' ? 'en' : 'zh',
          }),
        });
      }
      // 模式4, 5: 语音输入 + 翻译 + 朗读（固定语言）
      else if (mode === 4 || mode === 5) {
        resultEl.innerHTML = '<span class="spinner"></span>请说话，正在录音和翻译…';
        const voiceLang = config.source_lang;
        const targetLang = config.target_lang;
        data = await apiFetch('/api/translate', {
          method: 'POST',
          body: JSON.stringify({
            mode: 4,
            text: '',
            source_lang: voiceLang,
            target_lang: targetLang,
          }),
        });
      }
      // 模式1, 2: 纯文字模式
      else {
        resultEl.innerHTML = '<span class="spinner"></span>翻译中…';
        data = await apiFetch('/api/translate', {
          method: 'POST',
          body: JSON.stringify({
            mode,
            text,
            source_lang: config.source_lang,
            target_lang: config.target_lang,
          }),
        });
      }

      resultEl.textContent = data.result || data.text || JSON.stringify(data);
      await loadHistory();
    } catch (err) {
      resultEl.className = 'error';
      resultEl.textContent = '翻译失败：' + err.message;
    } finally {
      buttons.forEach(b => b.disabled = false);
      document.getElementById('lang-select').style.display = 'none';
    }
  }

  document.querySelectorAll('.btn-mode').forEach(btn => {
    btn.addEventListener('click', () => runTranslate(Number(btn.dataset.mode)));
  });

  /* ── Recording ── */

  let recording = false;
  let recordTimer = null;
  let recordStartTime = null;
  const MAX_RECORD_SECONDS = 180;

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function updateRecordTimer() {
    if (!recording || !recordStartTime) return;
    const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
    const remaining = Math.max(0, MAX_RECORD_SECONDS - elapsed);
    const statusEl = document.getElementById('record-status');
    statusEl.textContent = `正在录音 ${formatTime(elapsed)} / ${formatTime(MAX_RECORD_SECONDS)}`;
    if (remaining <= 10 && remaining > 0) {
      statusEl.style.color = '#ff4d4f';
    }
    if (remaining === 0) {
      statusEl.textContent = '录音时长已达上限，请稍候…';
      return;
    }
    recordTimer = setTimeout(updateRecordTimer, 1000);
  }

  function stopRecordTimer() {
    if (recordTimer) {
      clearTimeout(recordTimer);
      recordTimer = null;
    }
    recordStartTime = null;
    const statusEl = document.getElementById('record-status');
    statusEl.style.color = '';
  }

  document.getElementById('btn-record').addEventListener('click', async () => {
    const btn = document.getElementById('btn-record');
    const statusEl = document.getElementById('record-status');

    // 录音中：等待后端完成（Flask 同步请求，无法中断）
    if (recording) {
      statusEl.textContent = '正在停止录音，请稍候…';
      return;
    }

    recording = true;
    btn.disabled = false;
    btn.textContent = '录音中…';
    statusEl.style.color = '';
    statusEl.textContent = '正在录音 0:00 / 3:00';
    recordStartTime = Date.now();
    updateRecordTimer();

    try {
      const data = await apiFetch('/api/record', { method: 'POST' });
      stopRecordTimer();
      statusEl.textContent = data.message || '录音完成';
      showToast('录音已保存');
      await loadRecordings();
    } catch (err) {
      stopRecordTimer();
      statusEl.textContent = '录音失败：' + err.message;
      showToast('录音失败：' + err.message, 4000);
    } finally {
      recording = false;
      btn.disabled = false;
      btn.textContent = '开始录音';
    }
  });

  /* ── Export buttons ── */

  document.getElementById('btn-export-history').addEventListener('click', () => {
    downloadAudio('/api/history/export', 'history_export.zip');
  });

  document.getElementById('btn-export-recordings').addEventListener('click', () => {
    downloadAudio('/api/recordings/export', 'recordings_export.zip');
  });

  /* ── Init ── */

  loadStatus();
  loadHistory();
  loadRecordings();
</script>
</body>
</html>
